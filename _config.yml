title: "My Blog"
description: "Writing about X"
url: "https://code2motion.github.io"   # ← change to your site URL
baseurl: "/blog"                        # ← change or remove if deploying at root

# Minimal Mistakes via remote theme
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme

# Theme skin
minimal_mistakes_skin: "default"

# Header logo image path
logo: "/assets/images/logo.png"

# Quality-of-life
enable_copy_code_button: true

# Search
lunr:
  search_within_pages: true

# Make sure posts are output
collections:
  posts:
    output: true

# Defaults for posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true

author:
  name: "Nuwan Samarasinghe"

# Show excerpts in lists/cards
show_excerpts: true
excerpt_separator: "<!--more-->"

# Pretty URLs
permalink: /:categories/:title/

# Optional: your timezone
timezone: Europe/London

# Sass pipeline (Minimal Mistakes)
sass:
  style: compressed
