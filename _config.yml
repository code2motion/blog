# _config.yml
title: "My Blog"
description: "Writing about X"
url: "https://code2motion.github.io"
baseurl: "/blog"
theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-remote-theme
minimal_mistakes_skin: "default" 
lunr:
  search_within_pages: true
enable_copy_code_button: true
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
author:
  name: "Nuwan Samarasinghe"